  function updateSelectionText() {
    var text = "";
    if (selected.size === 0) text = "없음";
    else if (selected.size === 1) text = rowTitle(RAW[Array.from(selected)[0]]);
    else text = selected.size + "행 평균";
    selectionEl.innerHTML = "<strong>선택</strong> " + escapeHtml(text);
  }

  function drawLegend(vals) {
    legendEl.innerHTML = LABELS.map(function (lab, i) {
      return "<span><span class=\"uc-swatch\" style=\"background:" + COLORS[i] + "\"></span>" + escapeHtml(lab) + " " + vals[i].toFixed(1) + "%</span>";
    }).join("");
  }

  function drawPie(values) {
    var o = fitCanvas(pieCanvas, pieWrap, 256);
    var ctx = o.ctx;
    var w = o.lw;
    var h = o.lh;
    ctx.clearRect(0, 0, w, h);
    var cx = w * 0.5;
    var cy = h * 0.5;
    var R = Math.min(w, h) * 0.38;
    var r0 = R * 0.55;
    var total = values.reduce(function (a, b) { return a + b; }, 0) || 1;
    var ang = -Math.PI / 2;
    values.forEach(function (v, i) {
      var sweep = (v / total) * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(cx, cy, R, ang, ang + sweep);
      ctx.arc(cx, cy, r0, ang + sweep, ang, true);
      ctx.closePath();
      ctx.fillStyle = COLORS[i];
      ctx.fill();
      ctx.strokeStyle = BLACK;
      ctx.lineWidth = i === 5 ? 3 : 3;
      ctx.stroke();
      ang += sweep;
    });
    ctx.beginPath();
    ctx.arc(cx, cy, r0 - 0.5, 0, Math.PI * 2);
    ctx.strokeStyle = BLACK;
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx, cy, R + 0.5, 0, Math.PI * 2);
    ctx.stroke();
  }

  function drawBar(values) {
    var o = fitCanvas(barCanvas, barWrap, 256);
    var ctx = o.ctx;
    var w = o.lw;
    var h = o.lh;
    ctx.clearRect(0, 0, w, h);
    var pad = { l: Math.max(32, w * 0.08), r: 12, t: 16, b: Math.max(40, h * 0.18) };
    var innerW = w - pad.l - pad.r;
    var innerH = h - pad.t - pad.b;
    var maxV = Math.max.apply(null, values.concat([1]));
    var bw = innerW / values.length * 0.55;
    var gap = innerW / values.length * 0.45;
    ctx.fillStyle = BLACK;
    ctx.beginPath();
    roundPath(ctx, pad.l, pad.t, innerW, innerH, 8);
    ctx.fill();
    values.forEach(function (v, i) {
      var bh = (v / maxV) * innerH;
      var x = pad.l + i * (bw + gap) + gap * 0.18;
      var y = pad.t + innerH - bh;
      ctx.fillStyle = COLORS[i];
      var rr = 5;
      ctx.beginPath();
      if (bh >= rr) roundPath(ctx, x, y, bw, bh, rr);
      else ctx.rect(x, y, bw, Math.max(0, bh));
      ctx.fill();
      ctx.strokeStyle = BLACK;
      ctx.lineWidth = 3;
      ctx.stroke();
    });
    var fs = Math.max(9.5, Math.min(12, w / 48));
    ctx.fillStyle = YELLOW;
    ctx.font = "900 " + fs + "px Pretendard, sans-serif";
    LABELS.forEach(function (lab, i) {
      var x = pad.l + i * (bw + gap) + gap * 0.18 + bw / 2;
      ctx.save();
      ctx.translate(x, h - pad.b * 0.3);
      ctx.rotate(-0.45);
      ctx.textAlign = "right";
      ctx.fillText(lab, 0, 0);
      ctx.restore();
    });
  }

  function paint() {
    drawPie(displayVals);
    drawBar(displayVals);
    drawLegend(displayVals);
  }

  function tick(now) {
    var t = Math.min(1, (now - animStart) / ANIM_MS);
    var k = easeBezier6535(t);
    for (var i = 0; i < 6; i++) {
      displayVals[i] = fromVals[i] + (targetVals[i] - fromVals[i]) * k;
    }
    paint();
    if (t < 1) animFrame = requestAnimationFrame(tick);
    else {
      animFrame = 0;
      displayVals = targetVals.slice();
      paint();
    }
  }

  function goAnimate(next) {
    targetVals = next.slice();
    fromVals = displayVals.slice();
    animStart = performance.now();
    if (animFrame) cancelAnimationFrame(animFrame);
    animFrame = requestAnimationFrame(tick);
  }

  function applySelection() {
    var idxs = Array.from(selected).sort(function (a, b) { return a - b; });
    var vals = idxs.length ? averagePercents(idxs) : [0, 0, 0, 0, 0, 0];
    goAnimate(vals);
    syncRows();
    updateSelectionText();
  }

  tbody.addEventListener("click", function (e) {
    var tr = e.target.closest("tr");
    if (!tr || !tbody.contains(tr)) return;
    var idx = Number(tr.dataset.index);
    if (e.shiftKey && lastIndex !== null) {
      var a = Math.min(lastIndex, idx);
      var b = Math.max(lastIndex, idx);
      selected.clear();
      for (var i = a; i <= b; i++) selected.add(i);
    } else if (e.metaKey || e.ctrlKey) {
      if (selected.has(idx)) selected.delete(idx);
      else selected.add(idx);
      lastIndex = idx;
    } else {
      selected = new Set([idx]);
      lastIndex = idx;
    }
    if (selected.size === 0) selected.add(idx);
    applySelection();
  });

  ROOT.querySelector("#uc-btn-all").addEventListener("click", function () {
    selected.clear();
    for (var j = 0; j < RAW.length; j++) selected.add(j);
    lastIndex = RAW.length - 1;
    applySelection();
  });

  ROOT.querySelector("#uc-btn-clear").addEventListener("click", function () {
    selected = new Set([0]);
    lastIndex = 0;
    applySelection();
  });

  var resizeTimer;
  window.addEventListener("resize", function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(paint, 100);
  });

  if (typeof ResizeObserver !== "undefined") {
    var ro = new ResizeObserver(function () { paint(); });
    ro.observe(pieWrap);
    ro.observe(barWrap);
  }

  syncRows();
  updateSelectionText();
  displayVals = averagePercents([0]);
  targetVals = displayVals.slice();
  fromVals = displayVals.slice();
  paint();
})();
  </script>
</body>
</html>
