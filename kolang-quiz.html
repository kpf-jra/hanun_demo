<body>
  <div id="unique-content-991201">
    <div id="uc-fw-layer" aria-hidden="true"><canvas id="uc-fw-canvas-inner"></canvas></div>

    <div class="uc-inner">
      <div class="uc-mast">
        <a class="uc-back" href="index.html">← Lab</a>
      </div>

      <span class="uc-badge">기자 교육 · 우리말</span>
      <h1 class="uc-title">기자가 알아야 할<br />올바른 우리말 테스트</h1>
      <p class="uc-lead">기사·브리핑에서 자주 섞어 쓰는 표현을 골라 냈습니다. 제시되는 <strong>한 문장</strong>만 보고, 기사에 그대로 써도 되는 말이면 <strong>○</strong>, 고쳐 써야 하면 <strong>×</strong>를 눌러 주세요. 총 <strong>10문항</strong>입니다.</p>

      <section id="uc-screen-intro" class="uc-card" aria-labelledby="uc-intro-heading">
        <h2 id="uc-intro-heading" class="uc-prompt">준비되셨나요?</h2>
        <p class="uc-lead" style="margin-top:0">문항은 <strong>무작위 10개</strong>입니다. 각 문항마다 잘못 쓴 예 또는 바로잡은 예 가운데 하나가 임의로 나옵니다.</p>
        <button type="button" class="uc-btn" id="uc-start" style="margin-top:1rem">테스트 시작</button>
      </section>

      <section id="uc-screen-quiz" class="uc-card uc-hidden" aria-live="polite">
        <div class="uc-progress-row">
          <p class="uc-progress" id="uc-progress">문항 1 / 10</p>
          <p class="uc-score-live" id="uc-score-live" aria-live="polite">누적 0점</p>
        </div>
        <p class="uc-prompt">이 표현은 기사에 그대로 써도 될까요?</p>
        <p class="uc-phrase" id="uc-phrase"></p>
        <div class="uc-ox-row">
          <button type="button" class="uc-btn uc-ox-o" id="uc-pick-o" aria-label="옳은 표현이다">○ 예, 올바른 표현</button>
          <button type="button" class="uc-btn uc-ox-x" id="uc-pick-x" aria-label="잘못된 표현이다">× 아니요, 고쳐 써야 함</button>
        </div>
        <p class="uc-ox-hint">○ = 기사에 써도 되는 말 · × = 틀렸거나 어색한 말</p>
        <div class="uc-feedback" id="uc-feedback" role="status">
          <h3 id="uc-result-label"></h3>
          <p id="uc-explain"></p>
          <button type="button" class="uc-btn uc-next" id="uc-next">다음 문항</button>
        </div>
      </section>

      <section id="uc-screen-result" class="uc-card uc-hidden" aria-labelledby="uc-result-heading">
        <h2 id="uc-result-heading" class="uc-prompt">채점 결과</h2>
        <p class="uc-result-score" id="uc-score-line"></p>
        <p class="uc-result-msg" id="uc-tier-msg"></p>
        <button type="button" class="uc-btn" id="uc-retry">다시 풀기</button>
      </section>
    </div>
  </div>

  <script>
(function () {
  "use strict";

  var ROOT = document.getElementById("unique-content-991201");
  var bankEl = document.getElementById("uc-bank-json");
  if (!ROOT || !bankEl) return;

  var BANK = JSON.parse(bankEl.textContent);
  var TOTAL = 10;

  var elIntro = ROOT.querySelector("#uc-screen-intro");
  var elQuiz = ROOT.querySelector("#uc-screen-quiz");
  var elResult = ROOT.querySelector("#uc-screen-result");
  var elPhrase = ROOT.querySelector("#uc-phrase");
  var elProgress = ROOT.querySelector("#uc-progress");
  var elScoreLive = ROOT.querySelector("#uc-score-live");
  var elFeedback = ROOT.querySelector("#uc-feedback");
  var elResultLabel = ROOT.querySelector("#uc-result-label");
  var elExplain = ROOT.querySelector("#uc-explain");
  var elNext = ROOT.querySelector("#uc-next");
  var btnO = ROOT.querySelector("#uc-pick-o");
  var btnX = ROOT.querySelector("#uc-pick-x");
  var elScoreLine = ROOT.querySelector("#uc-score-line");
  var elTierMsg = ROOT.querySelector("#uc-tier-msg");
  var fwLayer = ROOT.querySelector("#uc-fw-layer");
  var fwCanvas = ROOT.querySelector("#uc-fw-canvas-inner");

  var queue = [];
  var index = 0;
  var score = 0;
  var locked = false;
  var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i];
      a[i] = a[j];
      a[j] = t;
    }
    return a;
  }

  function pickPhrase(row) {
    var useRight = Math.random() < 0.5;
    var pool = useRight ? row.right : row.wrong;
    var phrase = pool[Math.floor(Math.random() * pool.length)];
    var isRightPhrase = useRight;
    return { phrase: phrase, answerIsO: isRightPhrase, explain: row.explain };
  }

  function buildQueue() {
    var rows = shuffle(BANK).slice(0, TOTAL);
    return rows.map(pickPhrase);
  }

  function tierMessage(s) {
    if (s <= 3) return "당신은 우리말 연습이 반드시 필요한 기자예요!";
    if (s <= 7) return "틈틈히 우리말 공부를 해보아요~!";
    return "당신은 우리말 달인입니다";
  }

  function showIntro() {
    elIntro.classList.remove("uc-hidden");
    elQuiz.classList.add("uc-hidden");
    elResult.classList.add("uc-hidden");
  }

  function showQuiz() {
    elIntro.classList.add("uc-hidden");
    elQuiz.classList.remove("uc-hidden");
    elResult.classList.add("uc-hidden");
  }

  function showResult() {
    elIntro.classList.add("uc-hidden");
    elQuiz.classList.add("uc-hidden");
    elResult.classList.remove("uc-hidden");
    elScoreLine.textContent = score + " / " + TOTAL + "점";
    elTierMsg.textContent = tierMessage(score);
  }

  function updateLiveScore(mode) {
    if (!elScoreLive) return;
    if (mode === "feedback") {
      elScoreLive.textContent = "누적 " + score + "점 · " + (index + 1) + "문항 반영";
      return;
    }
    if (index === 0) {
      elScoreLive.textContent = "누적 0점 · 첫 문항";
    } else {
      elScoreLive.textContent = "누적 " + score + "점 · " + index + "문항까지 반영";
    }
  }

  function renderQuestion() {
    var q = queue[index];
    elProgress.textContent = "문항 " + (index + 1) + " / " + TOTAL;
    elPhrase.textContent = q.phrase;
    elFeedback.classList.remove("uc-on");
    btnO.disabled = false;
    btnX.disabled = false;
    locked = false;
    updateLiveScore("question");
  }

  function runFireworks() {
    if (reduceMotion) return;
    var canvas = fwCanvas;
    var layer = fwLayer;
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var w = window.innerWidth;
    var h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
    var ctx = canvas.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    var colors = ["#facc15", "#000000", "#ffffff"];
    var bursts = [];
    var i;
    var b;
    for (b = 0; b < 5; b++) {
      var cx = w * (0.2 + Math.random() * 0.6);
      var cy = h * (0.2 + Math.random() * 0.45);
      for (i = 0; i < 42; i++) {
        var ang = (Math.PI * 2 * i) / 42 + Math.random() * 0.4;
        var sp = 6 + Math.random() * 10;
        bursts.push({
          x: cx,
          y: cy,
          vx: Math.cos(ang) * sp,
          vy: Math.sin(ang) * sp - 4,
          g: 0.22 + Math.random() * 0.12,
          life: 1,
          c: colors[i % colors.length],
          sz: 4 + Math.random() * 5,
          rot: Math.random() * Math.PI
        });
      }
    }

    layer.classList.add("uc-on");
    var start = performance.now();
    var dur = 2200;

    function frame(now) {
      ctx.clearRect(0, 0, w, h);
      var alive = false;
      bursts.forEach(function (p) {
        if (p.life <= 0) return;
        alive = true;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.g;
        p.life -= 0.014;
        p.rot += 0.09;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.c;
        ctx.strokeStyle = "#000000";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.rect(-p.sz / 2, -p.sz / 2, p.sz, p.sz * 0.55);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      });
      if (alive && now - start < dur) {
        requestAnimationFrame(frame);
      } else {
        layer.classList.remove("uc-on");
        ctx.setTransform(1, 0, 0, 1, 0, 0);
      }
    }
    requestAnimationFrame(frame);
  }

  function onAnswer(pickedO) {
    if (locked) return;
    locked = true;
    btnO.disabled = true;
    btnX.disabled = true;

    var q = queue[index];
    var correct = pickedO === q.answerIsO;
    if (correct) score++;

    elResultLabel.textContent = correct ? "정답!" : "오답";
    elExplain.textContent = q.explain;
    elFeedback.classList.add("uc-on");

    if (correct) {
      runFireworks();
    } else {
      ROOT.classList.remove("uc-shake");
      void ROOT.offsetWidth;
      ROOT.classList.add("uc-shake");
      setTimeout(function () {
        ROOT.classList.remove("uc-shake");
      }, 700);
    }

    if (index >= TOTAL - 1) {
      elNext.textContent = "결과 보기";
    } else {
      elNext.textContent = "다음 문항";
    }
    updateLiveScore("feedback");
  }

  function onNext() {
    if (index >= TOTAL - 1) {
      showResult();
      return;
    }
    index++;
    renderQuestion();
  }

  ROOT.querySelector("#uc-start").addEventListener("click", function () {
    queue = buildQueue();
    index = 0;
    score = 0;
    showQuiz();
    renderQuestion();
  });

  btnO.addEventListener("click", function () {
    onAnswer(true);
  });
  btnX.addEventListener("click", function () {
    onAnswer(false);
  });
  elNext.addEventListener("click", onNext);

  ROOT.querySelector("#uc-retry").addEventListener("click", function () {
    showIntro();
  });
})();
  </script>
</body>
</html>
